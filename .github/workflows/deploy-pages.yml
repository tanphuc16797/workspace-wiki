name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'onboarding/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Package release assets
        run: bash scripts/package-release.sh

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R onboarding _site/onboarding
          cp -R release _site/release
          cp onboarding/index.en.html _site/index.html
          cp onboarding/index.html _site/index.vi.html
          cp onboarding/install.en.html _site/install.html
          cp onboarding/install.html _site/install.vi.html
          cp README.md _site/README.md
          cp QUICKSTART.md _site/QUICKSTART.md
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>contextd</title>
            <meta http-equiv="refresh" content="0; url=./onboarding/index.en.html" />
          </head>
          <body>
            <p>Redirecting to <a href="./onboarding/index.en.html">onboarding</a>...</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
